    <!-- ===============================
         基本設定
    =============================== -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F7F3EC" />

    <!-- 検索結果のリッチ化に寄せる（許容範囲で最大） -->
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta
      name="googlebot"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <!-- iOS の自動リンク化を避けたい場合のみ（必要ならON）
         ※タップ導線はサイト側で <a href="tel:..."> を明示して作る -->
    <!-- <meta name="format-detection" content="telephone=no" /> -->

    <!-- ===============================
         Favicon
    =============================== -->
    <link rel="icon" type="image/png" sizes="32x32" href="/yorisoi/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/yorisoi/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/yorisoi/apple-touch-icon.png" />
    <link rel="icon" type="image/x-icon" href="/yorisoi/favicon.ico" />

    <!-- ===============================
         TITLE（検索語順）
         例）エリア → 業種 → 強み → 店名
         ※長すぎると後半が切れるので「強みは3つまで」を目安
    =============================== -->
    <title>浦添・内間のメンズ専門理容室｜ヨリソイ Hair＆Spa｜朝7時〜／マンツーマン／駐車場</title>

    <!-- ===============================
         DESCRIPTION（自然文／初回不安を先に潰す）
         ※抽象語より「条件・事実」を優先
    =============================== -->
    <meta
      name="description"
      content="沖縄県浦添市内間のメンズ専門理容室 ヨリソイ Hair＆Spa。朝7:00〜、マンツーマン×半個室で相談しやすい。メンズカット／フェード／パーマ／シェービング／ヘッドスパ対応。駐車場あり。"
    />

    <!-- ===============================
         Canonical
         ※本番ドメインが決まったら必ず差し替え（VercelのURLは仮）
    =============================== -->
    <link rel="canonical" href="https://yorisoi-nine.vercel.app/" />

    <!-- ===============================
         OGP / Twitter
         ※og:image は 1200x630 推奨（差し替えるなら同比率で）
    =============================== -->

    <meta property="og:site_name" content="ヨリソイ Hair＆Spa" />
    <meta property="og:locale" content="ja_JP" />

    />

      content="朝7:00〜／マンツーマン／半個室。カット・フェード・パーマ・シェービング・ヘッドスパ。"
    />

    <meta property="og:image" content="https://yorisoi-nine.vercel.app/yorisoi/ogp.png" />

    <meta name="twitter:title" content="浦添・内間｜メンズ専門理容室 ヨリソイ Hair＆Spa" />
    <meta
      name="twitter:description"
      content="朝7:00〜／マンツーマン／駐車場あり。カット・フェード・パーマ・シェービング・ヘッドスパ。"
    />
    <meta name="twitter:image" content="https://yorisoi-nine.vercel.app/yorisoi/ogp.png" />
    <meta name="twitter:image:alt" content="ヨリソイ Hair＆Spa（浦添・内間のメンズ専門理容室）" />
